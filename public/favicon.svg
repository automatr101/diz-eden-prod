<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256" />
    </clipPath>
  </defs>
  <!-- Keep the image scaled perfectly inside the 512x512 circle -->
  <image width="512" height="512" preserveAspectRatio="xMidYMid slice" href="logo.png" clip-path="url(#circleClip)" />
</svg>
